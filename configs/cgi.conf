server {
    listen 127.0.0.1:8080;
    server_name cgi.demo;
    client_max_body_size 1m;

    location / {
        root www;
        index index.html;
        methods GET;
    }

    location /cgi-bin {
        root www/cgi-bin;
        methods GET POST;

        cgi_extension .py  /usr/bin/python3;   # Python
        cgi_extension .sh  /bin/bash;          # Shell
        cgi_extension .pl  /usr/bin/perl;      # Perl
        cgi_extension .cgi;                    # self-executing (shebang)
    }
}
