# Config designed to exercise every routing path.

server {
    listen 127.0.0.1:8080;
    server_name routing-test;
    client_max_body_size 1m;

    # Catch-all (always matches; lowest precedence)
    location / {
        root /var/www/site;
        index index.html;
        methods GET;
    }

    # Longer prefix should beat "/"
    location /api {
        root /var/www/api;
        methods GET POST DELETE;
    }

    # Subject's example, near verbatim
    location /kapouet {
        root /tmp/www;
        methods GET;
    }

    # Boundary case: /foo should NOT match /foobar
    location /foo {
        root /var/www/foo;
        methods GET;
    }

    # Permanent redirect
    location /old {
        return 301 /new-location;
    }

    # Per-location body limit override
    location /upload {
        root /var/www/uploads;
        methods POST;
        upload_store /tmp/uploads;
        client_max_body_size 10m;
    }

    # Autoindex on
    location /files {
        root /var/www/files;
        methods GET;
        autoindex on;
    }
}
