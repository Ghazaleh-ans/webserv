# Module 5 test config. Each non-"/" location has a root corresponding
# to where its content lives - because the Router strips the location
# prefix per the subject's /kapouet rule.

server {
    listen 127.0.0.1:8080;
    server_name static-test;
    client_max_body_size 1m;

    error_page 404 /errors/404.html;

    location / {
        root www;
        index index.html;
        methods GET;
    }

    location /static {
        root www/static;
        methods GET;
    }

    location /files {
        root www/files;
        methods GET;
        autoindex on;
    }

    location /deletable {
        root www/deletable;
        methods GET DELETE;
    }

    location /old {
        return 301 /;
    }

    location /errors {
        root www/errors;
        methods GET;
    }
}
