# Webserv test configuration
# Exercises every directive the parser supports.

server {
    listen 8080;
    host 127.0.0.1;
    server_name example.com www.example.com;
    client_max_body_size 1m;

    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/5xx.html;

    location / {
        root www;
        index index.html;
        methods GET;
        autoindex off;
    }

    location /upload {
        root www/uploads;
        methods POST DELETE;
        client_max_body_size 10M;
    }

    location /cgi-bin {
        root www/cgi-bin;
        methods GET POST;
        cgi_extension .py /usr/bin/python3;
        cgi_extension .php /usr/bin/php-cgi;
    }

    location /old {
        return 301 /new;
    }

    location /files {
        root www/files;
        methods GET;
        autoindex on;
    }
}

server {
    listen 0.0.0.0:9090;
    server_name api.example.com;

    error_page 400 /errors/400.html;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;

    location / {
        root www;
        index index.html;
        methods GET;
    }

    location /api {
        root www/api;
        methods GET POST DELETE;
    }
}
