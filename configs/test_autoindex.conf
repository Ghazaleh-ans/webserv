# Focus: directory listing — autoindex on vs off, and index taking precedence.

server {
	listen 127.0.0.1:8080;
	server_name autoindex-test;
	client_max_body_size 1m;

	location / {
		root www;
		index index.html;
		methods GET;
	}

	# autoindex ON, no index file present -> generated directory listing
	#   GET /files/  -> listing of file1.txt, file2.txt, Max.jpeg
	location /files {
		root www/files;
		methods GET;
		autoindex on;
	}

	# autoindex ON but an index.html exists -> index wins over the listing
	#   GET /api/  -> www/api/index.html (NOT a listing)
	location /api {
		root www/api;
		index index.html;
		methods GET;
		autoindex on;
	}

	# autoindex OFF, no index -> listing suppressed (403/404 on directory request)
	location /uploads {
		root www/uploads;
		methods GET;
		autoindex off;
	}
}
