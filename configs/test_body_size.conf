# Focus: client_max_body_size at server scope and per-location overrides.
# A location value of -1 (the default) means "inherit the server limit".

server {
	listen 127.0.0.1:8080;
	server_name bodysize-test;
	client_max_body_size 1k;               # server default: 1 KB

	error_page 413 /errors/413.html;

	location / {
		root www;
		index index.html;
		methods GET;
	}

	# No override -> inherits the 1 KB server limit
	location /default-limit {
		root www/uploads;
		methods POST;
		upload_store www/uploads;
	}

	# Limit of 10 bytes -> fits 10 ASCII chars; the 11th triggers 413
	location /ten {
		root www/uploads;
		methods POST;
		upload_store www/uploads;
		client_max_body_size 10;
	}

	# Limit of 5 bytes -> fits 5 ASCII chars; the 6th triggers 413
	location /tiny {
		root www/uploads;
		methods POST;
		upload_store www/uploads;
		client_max_body_size 5;
	}
}
