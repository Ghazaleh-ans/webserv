# Focus: CGI execution — multiple interpreters, POST body, query string,
#        custom Status header, and the 30s timeout (slow.py -> 504).

server {
	listen 127.0.0.1:8080;
	server_name cgi-test;
	client_max_body_size 1m;

	error_page 504 /errors/504.html;

	location / {
		root www;
		index index.html;
		methods GET;
	}

	location /cgi-bin {
		root www/cgi-bin;
		methods GET POST;

		cgi_extension .py  /usr/bin/python3;   # Python  (echo.py, greet.py, hello.py, status.py, slow.py)
		cgi_extension .sh  /bin/bash;          # Shell   (info.sh)
		cgi_extension .pl  /usr/bin/perl;      # Perl    (time.pl)
		cgi_extension .cgi;                    # self-executing via shebang (whoami.cgi)
	}
}
