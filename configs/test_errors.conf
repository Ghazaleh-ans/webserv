# Focus: custom error pages (single + grouped codes) and the routes that trigger them.
# Error-page paths resolve against the FIRST location's root (here: www).

server {
	listen 127.0.0.1:8080;
	server_name errors-test;
	client_max_body_size 1k;                       # small -> easy to trip 413

	error_page 403 /errors/403.html;
	error_page 404 /errors/404.html;
	error_page 405 /errors/405.html;
	error_page 413 /errors/413.html;
	error_page 500 502 504 /errors/5xx.html;   # one page for several codes

	# GET only: POST here => 405; an unknown path => 404
	location / {
		root www;
		index index.html;
		methods GET;
	}

	# autoindex off + no index => 403 on a directory request
	location /forbidden {
		root www/uploads;
		methods GET;
		autoindex off;
	}

	# POST against the tiny inherited 1 KB limit => 413
	location /tiny {
		root www/uploads;
		methods POST;
		upload_store www/uploads;
	}

	# The error pages themselves are served from here
	location /errors {
		root www/errors;
		methods GET;
	}
}
