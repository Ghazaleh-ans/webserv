# Focus: end-to-end — every major feature in one place, across two servers.
#   :8080 -> full-featured site   |   :9090 -> API surface + a 413 case

server {
	listen 127.0.0.1:8080;
	server_name webserv.local www.webserv.local;
	client_max_body_size 2m;

	error_page 403 /errors/403.html;
	error_page 404 /errors/404.html;
	error_page 405 /errors/405.html;
	error_page 413 /errors/413.html;
	error_page 500 502 504 /errors/5xx.html;

	# Static site root
	location / {
		root www;
		index index.html;
		methods GET;
		autoindex off;
	}

	# Non-default index filename
	location /static {
		root www/static;
		index page.html;
		methods GET;
	}

	# Directory listing
	location /files {
		root www/files;
		methods GET;
		autoindex on;
	}

	# Uploads + DELETE, with a raised limit
	location /upload {
		root www/uploads;
		methods GET POST DELETE;
		upload_store www/uploads;
		autoindex on;
		client_max_body_size 10m;
	}

	# DELETE target
	location /deletable {
		root www/deletable;
		methods GET DELETE;
	}

	# CGI (all four handler types)
	location /cgi-bin {
		root www/cgi-bin;
		methods GET POST;
		cgi_extension .py  /usr/bin/python3;
		cgi_extension .sh  /bin/bash;
		cgi_extension .pl  /usr/bin/perl;
		cgi_extension .cgi;
	}

	# Redirect
	location /old {
		return 301 /new;
	}

	# Error pages served directly
	location /errors {
		root www/errors;
		methods GET;
	}
}

# Second server on another port
server {
	listen 127.0.0.1:9090;
	server_name api.webserv.local;
	client_max_body_size 1m;

	error_page 404 /errors/404.html;
	error_page 405 /errors/405.html;

	location / {
		root www;
		index index.html;
		methods GET;
	}

	location /api {
		root www/api;
		index index.html;
		methods GET DELETE;
	}

	# Tiny limit -> 413 on POST
	location /small {
		root www/uploads;
		methods POST;
		upload_store www/uploads;
		client_max_body_size 200;
	}
}
