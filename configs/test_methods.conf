# Focus: per-location allowed methods and 405 responses (with Allow header).

server {
	listen 127.0.0.1:8080;
	server_name methods-test;
	client_max_body_size 1m;

	error_page 405 /errors/405.html;

	# GET only -> POST/DELETE => 405
	location / {
		root www;
		index index.html;
		methods GET;
	}

	# POST only (upload handler) -> GET/DELETE => 405
	location /submit {
		root www/uploads;
		methods POST;
		upload_store www/uploads;
	}

	# GET + DELETE -> POST => 405
	location /files {
		root www/files;
		methods GET DELETE;
	}

	# All three verbs allowed
	location /all {
		root www/uploads;
		methods GET POST DELETE;
		upload_store www/uploads;
	}
}
