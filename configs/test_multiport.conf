# Focus: several server blocks on distinct ports (one Listener per host:port).
# Each port serves the same landing page with a different background shade,
# so you can tell at a glance which listener answered.
#   :8080 -> dark (#111)   |   :8081 -> navy (#12263a)   |   :8082 -> blue (#1f4e79)

server {
	listen 127.0.0.1:8080;
	server_name first;
	client_max_body_size 1m;

	location / {
		root www;
		index index.html;
		methods GET;
	}
}

server {
	listen 127.0.0.1:8081;
	server_name second;
	client_max_body_size 1m;

	location / {
		root www/second;
		index index.html;
		methods GET;
	}
}

server {
	listen 0.0.0.0:8082;
	server_name third;
	client_max_body_size 512k;

	location / {
		root www/third;
		index index.html;
		methods GET;
	}
}
