# Focus: the `return` directive — 301 redirect short-circuits the method check.
# The server passes the code straight through, so one 301 exercises the feature;
# only the internal-path vs. absolute-URL target differs.

server {
	listen 127.0.0.1:8080;
	server_name redirect-test;
	client_max_body_size 1m;

	location / {
		root www;
		index index.html;
		methods GET;
	}

	# 301 Moved Permanently -> internal path
	location /old {
		return 301 /new;
	}

	# 301 Moved Permanently -> absolute external URL
	location /external {
		return 301 http://google.com/;
	}
}
