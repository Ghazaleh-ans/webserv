# Focus: location matching — longest-prefix precedence and the /foo vs /foobar boundary.

server {
	listen 127.0.0.1:8080;
	server_name routing-test;
	client_max_body_size 1m;

	# Catch-all (lowest precedence; always matches)
	location / {
		root www;
		index index.html;
		methods GET;
	}

	# Longer prefix beats "/"
	location /api {
		root www/api;
		index index.html;
		methods GET DELETE;
	}

	# Subject's kapouet example (near verbatim)
	location /kapouet {
		root www/kapouet;
		index index.html;
		methods GET;
	}

	# Boundary case: /foo must NOT capture /foobar
	location /foo {
		root www/foo;
		index index.html;
		methods GET;
	}

	# Autoindexed subtree under a longer prefix
	location /files {
		root www/files;
		methods GET;
		autoindex on;
	}
}
