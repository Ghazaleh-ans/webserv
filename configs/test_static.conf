# Focus: static file serving — roots, index resolution, MIME types, direct files.

server {
	listen 127.0.0.1:8080;
	server_name static-test;
	client_max_body_size 1m;

	error_page 404 /errors/404.html;

	# Site root: serves www/index.html
	location / {
		root www;
		index index.html;
		methods GET;
	}

	# Non-default index filename (page.html instead of index.html)
	location /static {
		root www/static;
		index page.html;
		methods GET;
	}

	# Direct file serving: text files + an image asset (Content-Type via MimeTypes)
	#   GET /files/file1.txt   -> text/plain
	#   GET /files/Max.jpeg    -> image/jpeg
	location /files {
		root www/files;
		methods GET;
	}
}
