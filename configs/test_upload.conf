# Focus: file upload (POST, raw + multipart) and DELETE, plus a 413 case.

server {
	listen 127.0.0.1:8080;
	server_name upload-test;
	client_max_body_size 10m;

	error_page 413 /errors/413.html;

	# Interactive upload form (www/upload_test.html)
	location / {
		root www;
		index upload_test.html;
		methods GET;
	}

	# Raw + multipart uploads; GET lists saved files, DELETE removes them
	location /upload {
		root www/uploads;
		methods GET POST DELETE;
		upload_store www/uploads;
		autoindex on;
	}

	# Tiny per-location limit -> forces 413 Payload Too Large
	location /small-upload {
		root www/uploads;
		methods POST;
		upload_store www/uploads;
		client_max_body_size 100;
	}
}
