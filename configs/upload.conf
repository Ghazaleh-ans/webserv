# Module 7 test config: file upload endpoint.

server {
    listen 127.0.0.1:8080;
    server_name upload-test;
    client_max_body_size 10m;

    # Static root
    location / {
        root www;
        index index.html;
        methods GET;
    }

    # Upload endpoint
    location /upload {
        root www/uploads;
        methods POST GET DELETE;
        upload_store www/uploads;
        autoindex on;
    }

    # Per-location small limit, for testing 413
    location /small-upload {
        root www/uploads;
        methods POST;
        upload_store www/uploads;
        client_max_body_size 100;
    }
}
