# End-to-end integration test config.
# Each server has different settings so we can prove the parser's values
# actually reach the running server.

server {
    listen 127.0.0.1:8080;
    server_name primary;
    client_max_body_size 1024;     # 1 KB — small, so we can prove the limit

    location / {
        root /tmp/webserv_www;
        methods GET;
    }
}

server {
    listen 127.0.0.1:8081;
    server_name secondary;
    client_max_body_size 1m;       # 1 MB — different from server 1

    location / {
        root /tmp/webserv_www;
        methods GET POST;
    }
}
