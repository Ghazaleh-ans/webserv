<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Page &middot; webserv</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #1a1a2e;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 520px;
            width: 100%;
            overflow: hidden;
        }
        .card img {
            width: 100%;
            height: 600px;
            object-fit: cover;
            display: block;
        }
        .card-body {
            padding: 2rem;
            text-align: center;
        }
        .card-body h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .card-body p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .badge {
            display: inline-block;
            background: #2a5298;
            color: #fff;
            padding: 0.4rem 1rem;
            border-radius: 999px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        a.home {
            display: inline-block;
            margin-top: 1.5rem;
            color: #2a5298;
            text-decoration: none;
            font-weight: 600;
        }
        a.home:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/files/Max.jpeg" alt="Featured photo">
        <div class="card-body">
            <span class="badge">Served by webserv</span>
            <h1>Static Page</h1>
            <p>
                This page is delivered straight from disk by our C++98 HTTP
                server. The photo above is a separate static asset, fetched
                over its own request from the <code>/files</code> location.
            </p>
            <a class="home" href="/">&larr; Back to home</a>
        </div>
    </div>
</body>
</html>
